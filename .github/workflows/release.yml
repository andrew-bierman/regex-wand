name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Use npm 11
        run: npm install --global npm@^11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check release tag
        working-directory: packages/regex-wand
        run: bun run scripts/assert-release-tag.ts "${RELEASE_TAG}"
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

      - name: Run release checks
        run: bun run check && bun run test:coverage && bun run registry:check

      - name: Verify npm package contents
        working-directory: packages/regex-wand
        run: npm publish --access public --dry-run

      - name: Publish to npm
        working-directory: packages/regex-wand
        run: npm publish --access public --provenance

      - name: Create GitHub release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
