name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/workflows/ci.yml"
      - "biome.json"
      - "bun.lock"
      - "package.json"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Bun release gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI check
        run: bun run ci:check

  compatibility:
    name: Bun ${{ matrix.bun-version }} / TypeScript ${{ matrix.typescript-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version:
          - 1.2.22
          - 1.3.14
        typescript-version:
          - 5.6.3
          - 5.9.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install matrix TypeScript
        working-directory: packages/regex-wand
        run: bun add --dev --no-save typescript@${{ matrix.typescript-version }}

      - name: Run package compatibility checks
        working-directory: packages/regex-wand
        run: bun run build && bun run typecheck && bun run type-test && bun run test
